<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hospital Details - Sehat Setu</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="hospital-list.css" />
  <link rel="stylesheet" href="css/hospital-enhanced.css" />
  <link rel="stylesheet" href="css/language-switcher.css" />
  <link rel="stylesheet" href="css/chatbot.css" />
  <style>
    .hospital-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
      margin-bottom: 2rem;
      padding: 2rem;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .hospital-name {
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
      color: var(--text);
    }

    .hospital-type {
      color: var(--text-light);
      font-size: 1.1rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .hospital-details-grid {
      display: grid;
      gap: 2rem;
    }

    .detail-section {
      padding: 2rem;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .detail-section h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: var(--text);
      font-size: 1.5rem;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 0.5rem;
    }

    .info-list p {
      margin: 0.75rem 0;
      color: var(--text);
    }

    .info-list strong {
      display: inline-block;
      min-width: 120px;
      color: var(--text-light);
    }

    .facilities-list {
      list-style: none;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .facilities-list li {
      padding: 0.75rem 1rem;
      background: var(--bg);
      border-radius: 8px;
      border-left: 3px solid var(--primary);
    }

    .doctors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .doctor-card {
      padding: 1.5rem;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .doctor-card h4 {
      margin: 0 0 0.5rem 0;
      color: var(--text);
    }

    .specialization {
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .doctor-card p {
      margin: 0.5rem 0;
      font-size: 0.95rem;
      color: var(--text-light);
    }

    .treatments-list {
      display: grid;
      gap: 1rem;
    }

    .treatment-item {
      padding: 1.25rem;
      background: var(--bg);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }

    .treatment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .treatment-header h4 {
      margin: 0;
      color: var(--text);
    }

    .cost-range {
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }

    .treatment-notes {
      margin: 0;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .insurance-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .insurance-item {
      padding: 1.25rem;
      background: var(--bg);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .insurance-item h4 {
      margin: 0 0 0.75rem 0;
      color: var(--text);
    }

    .insurance-item p {
      margin: 0.5rem 0;
      color: var(--text-light);
    }

    .verified-info {
      text-align: center;
      color: var(--text-light);
      font-size: 0.9rem;
      margin-top: 2rem;
      font-style: italic;
    }

    .loading-spinner, .error-message {
      text-align: center;
      padding: 4rem 2rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message h2 {
      color: var(--danger, #e74c3c);
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .hospital-header {
        flex-direction: column;
      }

      .header-actions {
        width: 100%;
      }

      .header-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html#home" aria-label="Sehat Setu Patna Home">
        <img src="logo.jpeg" alt="Sehat Setu Logo" class="logo-img" />
        <span class="brand__text">Sehat Setu <span style="color: var(--primary);">Patna</span></span>
      </a>

      <div class="nav-right">
        <nav class="nav-links" aria-label="Primary">
          <a href="index.html#home" data-translate="nav.home">Home</a>
          <a href="index.html#about" data-translate="nav.about">About</a>
          <a href="services.html" data-translate="nav.services">Services</a>
          <a href="hospital-list.html" data-translate="nav.hospitals">Hospitals</a>
          <a href="patient-register.html" data-translate="nav.register">Register</a>
          <a class="cta" href="index.html#contact" data-translate="nav.contact">Get In Touch</a>
        </nav>

        <button class="theme-toggle" id="themeToggle" aria-label="Toggle color theme" title="Toggle theme">
          <span id="themeIcon" aria-hidden="true">🌙</span>
        </button>

        <button class="menu-btn" aria-label="Toggle menu" aria-expanded="false" id="menuBtn">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M3 12h18M3 18h18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="container mobile-menu" id="mobileMenu" aria-label="Mobile">
      <a href="index.html#home" data-translate="nav.home">Home</a>
      <a href="index.html#about" data-translate="nav.about">About</a>
      <a href="services.html" data-translate="nav.services">Services</a>
      <a href="hospital-list.html" data-translate="nav.hospitals">Hospitals</a>
      <a href="patient-register.html" data-translate="nav.register">Register</a>
      <a class="cta" href="index.html#contact" data-translate="nav.contact">Get In Touch</a>
    </div>
  </header>

  <!-- CONTENT -->
  <main style="padding: 2rem 0; min-height: 60vh;">
    <div class="container">
      <div id="loading" class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading hospital details...</p>
      </div>
      
      <div id="error" style="display:none;"></div>
      
      <div id="hospitalContent"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer style="background: var(--card-bg); padding: 2rem 0; margin-top: 4rem; text-align: center;">
    <div class="container">
      <p style="color: var(--text-light); margin: 0;">© 2026 Sehat Setu. All rights reserved.</p>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script src="js/hospital-enhanced.js"></script>
  <script src="js/hospital-detail.js"></script>
  <script>
    // Mobile menu
    (function () {
      const btn = document.getElementById('menuBtn');
      const menu = document.getElementById('mobileMenu');
      if (!btn || !menu) return;
      function closeMenu(){ menu.style.display='none'; btn.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
      function openMenu(){ menu.style.display='flex'; btn.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
      btn.addEventListener('click', (e)=>{ e.stopPropagation(); (menu.style.display==='flex') ? closeMenu() : openMenu(); });
      document.addEventListener('click', (e)=>{ if (!menu.contains(e.target) && !btn.contains(e.target)) closeMenu(); });
      window.addEventListener('resize', ()=>{ if (window.innerWidth > 980) closeMenu(); });
      menu.querySelectorAll('a, button').forEach(el => el.addEventListener('click', closeMenu));
    })();

    // Theme toggle
    (function () {
      const THEME_KEY='carely-theme', html=document.documentElement, icon=document.getElementById('themeIcon');
      function apply(mode){
        html.setAttribute('data-theme', mode);
        const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = mode==='dark' || (mode==='system' && prefersDark);
        if (icon) icon.textContent = isDark ? '☀️' : '🌙';
      }
      function next(cur){ if (cur==='system') return 'dark'; if (cur==='dark') return 'light'; return 'system'; }
      const saved=localStorage.getItem(THEME_KEY)||html.getAttribute('data-theme')||'system';
      apply(saved);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', ()=>{ if((localStorage.getItem(THEME_KEY)||'system')==='system') apply('system'); });
      document.getElementById('themeToggle')?.addEventListener('click', ()=>{ const cur=html.getAttribute('data-theme')||'system'; const n=next(cur); localStorage.setItem(THEME_KEY,n); apply(n); });
    })();
  </script>

  <!-- Language & Theme Management Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/language-switcher.js"></script>
  <script src="js/ai-conversation.js"></script>
  <script src="js/chatbot-enhanced.js"></script>
</body>
</html>
